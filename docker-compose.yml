
networks:
  edgepulse-net:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  checkpoint-data:

services:
  # ─── Zookeeper ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: edgepulse-zookeeper
    networks: [edgepulse-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ───────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edgepulse-kafka
    networks: [edgepulse-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Kafka Topic Init ────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edgepulse-kafka-init
    networks: [edgepulse-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-telemetry --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed-telemetry --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic anomalies --partitions 1 --replication-factor 1
      echo 'Kafka topics created.'
      "
    restart: "no"

  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: edgepulse-postgres
    networks: [edgepulse-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edgepulse
      POSTGRES_PASSWORD: edgepulse_secret
      POSTGRES_DB: edgepulse
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgepulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Telemetry Producer ───────────────────────────────────────
  producer:
    image: python:3.10-slim
    container_name: edgepulse-producer
    networks: [edgepulse-net]
    working_dir: /app
    volumes:
      - ./producer:/app
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-telemetry
      EVENTS_PER_SECOND: "10"
      NUM_PATIENTS: "8"
    command: >
      sh -c "pip install --quiet kafka-python==2.0.2
      && python kafka_producer.py"
    restart: unless-stopped

  # ─── Spark Structured Streaming ───────────────────────────────
  spark-stream:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: edgepulse-spark
    networks: [edgepulse-net]
    working_dir: /app
    volumes:
      - checkpoint-data:/app/data/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-telemetry
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: edgepulse
      DB_USER: edgepulse
      DB_PASSWORD: edgepulse_secret
    restart: unless-stopped

  # ─── Next.js Dashboard ────────────────────────────────────────
  web:
    image: node:20-alpine
    container_name: edgepulse-web
    networks: [edgepulse-net]
    working_dir: /app
    volumes:
      - ./web:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: edgepulse
      DB_USER: edgepulse
      DB_PASSWORD: edgepulse_secret
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
